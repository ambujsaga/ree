<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="logo.jpg?v=1.1">
    <link rel="apple-touch-icon" sizes="192x192" href="logo.jpg?v=1.1">
    <link rel="manifest" href="manifest.json">
    <title>ree | the future</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animated Background Gradient */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            overflow: hidden;
        }

        /* Floating Glow Effect */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(138, 43, 226, 0.4);
            filter: blur(100px);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out alternate;
        }

        @keyframes float {
            0% { transform: translate(-50px, -50px); }
            100% { transform: translate(50px, 50px); }
        }

        /* Brand Wrapper */
        .brand-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards 0.5s ease-out;
        }

        /* Brand Symbol Image Styling */
        .brand-logo {
            height: 150px; 
            width: auto;
            max-width: 90vw;
            object-fit: contain;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #888;
            margin-top: 20px;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards 0.8s ease-out;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Call to Action Container */
        .cta-container {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 15px; 
            z-index: 2;
            opacity: 0;
            animation: fadeInUp 1s forwards 1.1s ease-out;
        }

        /* Call to Action Button */
        .cta-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            color: #fff;
            background: transparent;
            border: 2px solid #8a2be2;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-btn:hover:not(:disabled) {
            background: #8a2be2;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
            transform: scale(1.05);
        }

        .cta-btn:disabled {
            background: #8a2be2;
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Realtime Count Badge */
        .click-count {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: rgba(138, 43, 226, 0.2);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(138, 43, 226, 0.5);
            transition: all 0.3s ease;
            min-width: 60px;
            text-align: center;
        }

        /* Scroll Reveal Section */
        .content-section {
            padding: 100px 20px 20px;
            text-align: center;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reveal-text {
            max-width: 800px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
        }

        .reveal-text h2 {
            font-size: 3rem;
            text-align: center;
        }

        .signature {
            font-size: 1.2rem;
            color: #888;
            margin-top: 15px;
            font-style: italic; 
        }

        .reveal-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Boom Animation Particles CSS */
        .particle {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* --- NAYA SECTION CSS: "Also from" UI --- */
        .also-from-section {
            padding: 40px 20px 80px;
            max-width: 600px;
            margin: 0 auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .also-from-title {
            font-size: 1rem;
            color: #888;
            margin-bottom: 25px;
            text-align: left;
            font-weight: normal;
        }

        .also-from-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: nowrap;
            gap: 15px;
        }

        .also-from-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s ease;
            flex: 1;
        }

        .also-from-item:hover {
            transform: translateY(-5px);
        }

        .icon-circle {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(138, 43, 226, 0.05);
            border: 1px solid rgba(138, 43, 226, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .also-from-item:hover .icon-circle {
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
            border-color: rgba(138, 43, 226, 0.8);
            background: rgba(138, 43, 226, 0.15);
        }

        /* Agar tum apni koi PNG image lagana chaho Thejaya ke liye toh yaha fit ho jayegi */
        .icon-circle img {
            width: 32px; 
            height: 32px;
            object-fit: contain;
        }

        .also-from-item span {
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>
    <script src="https://pl29485817.effectivecpmnetwork.com/cc/bd/8c/ccbd8c819b67bbe0311b54841f1dd181.js"></script>

    <section class="hero">
        <div class="glow"></div>
        
        <div class="brand-wrapper">
            <img src="ree.png" alt="ree Symbol" class="brand-logo">
        </div>
        
        <p class="subtitle">Redefining the ordinary.</p>
        
        <div class="cta-container">
            <button class="cta-btn" id="followBtn">Vote</button>
            <span class="click-count" id="clickCount">0</span>
        </div>
    </section>

    <section class="content-section">
        <div class="reveal-text">
            <h2>Welcome to the next generation of style and innovation. This is where my journey begins.</h2>
            <span class="signature">- Ambuj Saga</span>
        </div>
    </section>

    <section class="also-from-section">
        <h3 class="also-from-title">Also from ree</h3>
        <div class="also-from-grid">
            
            <a href="https://thejaya.vercel.app" target="_blank" class="also-from-item">
                <div class="icon-circle">
                    <img src="thejaya.jpg" alt="Thejaya" style="filter: invert(1) opacity(0.8);">
                </div>
                <span>Thejaya</span>
            </a>
            
            <a href="#" target="_blank" class="also-from-item">
                <div class="icon-circle">
                    <img src="soon.jpg" alt="Saga Links" style="filter: invert(1) opacity(0.8);">
                </div>
                <span>---</span>
            </a>

            <a href="#" target="_blank" class="also-from-item">
                <div class="icon-circle">
                    <img src="soon.jpg" alt="Projects" style="filter: invert(1) opacity(0.8);">
                </div>
                <span>---</span>
            </a>

            <a href="#" target="_blank" class="also-from-item">
                <div class="icon-circle">
                    <img src="soon.jpg" alt="More" style="filter: invert(1) opacity(0.8);">
                </div>
                <span>---</span>
            </a>

        </div>
    </section>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.5 });

            const revealElements = document.querySelectorAll('.reveal-text');
            revealElements.forEach(el => observer.observe(el));
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOdF10p3WVV5XDE8jnzttzw3VnZJU-bXU",
            authDomain: "game-b37ee.firebaseapp.com",
            databaseURL: "https://game-b37ee-default-rtdb.firebaseio.com",
            projectId: "game-b37ee",
            storageBucket: "game-b37ee.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const clickRef = ref(db, 'feedback_clicks'); 
        const followBtn = document.getElementById('followBtn');
        const clickCountDisplay = document.getElementById('clickCount');

        // Check LocalStorage on page load to see if user has already voted
        if (localStorage.getItem('ree_followed') === 'true') {
            followBtn.innerText = 'Voted';
            followBtn.disabled = true;
        }

        onValue(clickRef, (snapshot) => {
            const data = snapshot.val();
            clickCountDisplay.innerText = data || 0; 
        });

        followBtn.addEventListener('click', (e) => {
            // Prevent multiple clicks if already voted
            if (localStorage.getItem('ree_followed') === 'true') return;

            // Mark as voted in local storage
            localStorage.setItem('ree_followed', 'true');
            followBtn.innerText = 'Voted';
            followBtn.disabled = true;

            // --- Boom Animation Logic ---
            for (let i = 0; i < 35; i++) {
                let particle = document.createElement('div');
                particle.className = 'particle';
                document.body.appendChild(particle);

                // Math for explosion spread
                let angle = Math.random() * 2 * Math.PI;
                let distance = Math.random() * 120 + 30; 
                let tx = Math.cos(angle) * distance;
                let ty = Math.sin(angle) * distance;

                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);

                // Random colors for particles (Purple theme)
                const colors = ['#8a2be2', '#b82be2', '#5c2be2', '#ffffff'];
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                setTimeout(() => {
                    particle.remove();
                }, 800);
            }
            // -----------------------------

            // Firebase Transaction
            runTransaction(clickRef, (currentCount) => {
                return (currentCount || 0) + 1;
            });
            
            // Button animation effect
            followBtn.style.transform = "scale(0.95)";
            setTimeout(() => {
                followBtn.style.transform = "scale(1)";
            }, 100);
        });
    </script>
</body>
</html>
