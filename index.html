<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ree. | The Future</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animated Background Gradient */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            overflow: hidden;
        }

        /* Floating Glow Effect */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(138, 43, 226, 0.4);
            filter: blur(100px);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out alternate;
        }

        @keyframes float {
            0% { transform: translate(-50px, -50px); }
            100% { transform: translate(50px, 50px); }
        }

        /* Brand Wrapper (Only Image Now) */
        .brand-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards 0.5s ease-out;
        }

        /* Brand Symbol Image Styling (Resized) */
        .brand-logo {
            height: 150px; 
            width: auto;
            max-width: 90vw;
            object-fit: contain;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #888;
            margin-top: 20px;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards 0.8s ease-out;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Call to Action Container */
        .cta-container {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 15px; 
            z-index: 2;
            opacity: 0;
            animation: fadeInUp 1s forwards 1.1s ease-out;
        }

        /* Call to Action Button */
        .cta-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            color: #fff;
            background: transparent;
            border: 2px solid #8a2be2;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-btn:hover {
            background: #8a2be2;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
            transform: scale(1.05);
        }

        /* Realtime Count Badge */
        .click-count {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: rgba(138, 43, 226, 0.2);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(138, 43, 226, 0.5);
            transition: all 0.3s ease;
            min-width: 60px;
            text-align: center;
        }

        /* Scroll Reveal Section */
        .content-section {
            padding: 100px 20px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Note text container */
        .reveal-text {
            max-width: 800px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
        }

        .reveal-text h2 {
            font-size: 3rem;
            text-align: center;
        }

        .signature {
            font-size: 1.2rem;
            color: #888;
            margin-top: 15px;
            font-style: italic; 
        }

        .reveal-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="glow"></div>
        
        <div class="brand-wrapper">
            <img src="ree.png" alt="ree Symbol" class="brand-logo">
        </div>
        
        <p class="subtitle">Redefining the ordinary.</p>
        
        <div class="cta-container">
            <button class="cta-btn" id="followBtn">Follow</button>
            <span class="click-count" id="clickCount">0</span>
        </div>
    </section>

    <section class="content-section">
        <div class="reveal-text">
            <h2>Welcome to the next generation of style and innovation. This is where your journey begins.</h2>
            <span class="signature">- Ambuj Saga</span>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.5 });

            const revealElements = document.querySelectorAll('.reveal-text');
            revealElements.forEach(el => observer.observe(el));
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOdF10p3WVV5XDE8jnzttzw3VnZJU-bXU",
            authDomain: "game-b37ee.firebaseapp.com",
            databaseURL: "https://game-b37ee-default-rtdb.firebaseio.com",
            projectId: "game-b37ee",
            storageBucket: "game-b37ee.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Retained the same database reference so old counts aren't lost
        const clickRef = ref(db, 'feedback_clicks'); 

        // Updated variable names to match the new Follow button
        const followBtn = document.getElementById('followBtn');
        const clickCountDisplay = document.getElementById('clickCount');

        onValue(clickRef, (snapshot) => {
            const data = snapshot.val();
            clickCountDisplay.innerText = data || 0; 
        });

        // Event listener is strictly for incrementing the count (no unfollow option)
        followBtn.addEventListener('click', () => {
            runTransaction(clickRef, (currentCount) => {
                return (currentCount || 0) + 1;
            });
            
            // Button animation effect
            followBtn.style.transform = "scale(0.95)";
            setTimeout(() => {
                followBtn.style.transform = "scale(1)";
            }, 100);
        });
    </script>
</body>
</html>
