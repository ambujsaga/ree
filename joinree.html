<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="logo.jpg?v=1.1">
    <link rel="apple-touch-icon" sizes="192x192" href="logo.jpg?v=1.1">
    <title>ree. | Join The Future</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0a0a0a; color: #ffffff; overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .glow {
            position: absolute; width: 300px; height: 300px; background: rgba(138, 43, 226, 0.4);
            filter: blur(100px); border-radius: 50%; animation: float 6s infinite ease-in-out alternate; z-index: 0;
        }
        @keyframes float { 0% { transform: translate(-50px, -50px); } 100% { transform: translate(50px, 50px); } }

        .form-container {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(138, 43, 226, 0.2);
            padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; z-index: 2;
            backdrop-filter: blur(10px); text-align: center;
        }

        .form-container h2 { margin-bottom: 20px; font-size: 2rem; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; padding: 12px 15px; border-radius: 10px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(138, 43, 226, 0.3); color: #fff; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            border-color: #8a2be2; box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        /* Phone Number Row Styles */
        .phone-group { display: flex; gap: 10px; }
        .phone-group select { width: 35%; cursor: pointer; }
        .phone-group select option { background: #0a0a0a; color: #fff; }
        .phone-group .custom-code-input { width: 35%; display: none; }
        .phone-group input[type="tel"] { flex: 1; }
        
        /* Disabled Input Style */
        .input-group input:disabled, .input-group select:disabled { opacity: 0.5; cursor: not-allowed; }

        /* WhatsApp Section Styles */
        .wa-toggle-group { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px; }
        .wa-toggle-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #25D366; }
        .wa-toggle-group label { cursor: pointer; font-size: 1rem; color: #ddd; display: flex; align-items: center; gap: 8px; }
        
        .whatsapp-options { display: none; background: rgba(37, 211, 102, 0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(37, 211, 102, 0.2); margin-bottom: 15px; }
        .or-divider { text-align: center; margin: 10px 0; color: #777; font-size: 0.9rem; font-weight: bold; }

        .cta-btn {
            width: 100%; padding: 15px; font-size: 1.1rem; color: #fff; font-weight: bold;
            background: transparent; border: 2px solid #8a2be2; border-radius: 30px;
            cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
        }
        .cta-btn:hover { background: #8a2be2; box-shadow: 0 0 20px rgba(138, 43, 226, 0.6); transform: scale(1.05); }

        /* Boom Animation Particles */
        .particle {
            position: fixed; width: 10px; height: 10px; border-radius: 50%;
            pointer-events: none; z-index: 9999; animation: explode 0.8s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div class="form-container">
        <h2>Join ree.</h2>
        <form id="userForm">
            <div class="input-group">
                <input type="text" id="userName" placeholder="Your Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="userEmail" placeholder="Your Email" required>
            </div>
            
            <div class="input-group phone-group">
                <select id="countryCode" required>
                    <option value="" disabled selected>Code</option>
                    <option value="+91">+91 (IN)</option>
                    <option value="+1">+1 (US/CA)</option>
                    <option value="+44">+44 (UK)</option>
                    <option value="other">Other...</option>
                </select>
                <input type="text" id="customCountryCode" class="custom-code-input" placeholder="+XXX">
                <input type="tel" id="userPhone" placeholder="Phone Number" disabled required>
            </div>

            <div class="wa-toggle-group">
                <input type="checkbox" id="waToggle">
                <label for="waToggle">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#25D366" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                    </svg>
                    Contact via WhatsApp
                </label>
            </div>

            <div class="whatsapp-options" id="waOptions">
                <div class="input-group" style="margin-bottom: 0;">
                    <input type="text" id="waUsername" placeholder="WhatsApp Username">
                </div>
                
                <div class="or-divider">OR</div>
                
                <div class="input-group phone-group" style="margin-bottom: 0;">
                    <select id="waCountryCode">
                        <option value="" selected>Code</option>
                        <option value="+91">+91 (IN)</option>
                        <option value="+1">+1 (US/CA)</option>
                        <option value="+44">+44 (UK)</option>
                        <option value="other">Other...</option>
                    </select>
                    <input type="text" id="waCustomCountryCode" class="custom-code-input" placeholder="+XXX">
                    <input type="tel" id="waPhone" placeholder="WhatsApp Number" disabled>
                </div>
            </div>

            <div class="input-group">
                <textarea id="userAddress" rows="2" placeholder="Your Full Address" required></textarea>
            </div>

            <div class="input-group">
                <textarea id="userMessage" rows="3" placeholder="Tell us about yourself" required></textarea>
            </div>
            
            <button type="submit" class="cta-btn" id="submitBtn">Submit Data</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOdF10p3WVV5XDE8jnzttzw3VnZJU-bXU",
            authDomain: "game-b37ee.firebaseapp.com",
            databaseURL: "https://game-b37ee-default-rtdb.firebaseio.com",
            projectId: "game-b37ee",
            storageBucket: "game-b37ee.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const form = document.getElementById('userForm');
        const submitBtn = document.getElementById('submitBtn');
        
        // Main Phone Logic Setup
        const countryCodeSelect = document.getElementById('countryCode');
        const customCountryCode = document.getElementById('customCountryCode');
        const userPhone = document.getElementById('userPhone');

        countryCodeSelect.addEventListener('change', (e) => {
            if (e.target.value === 'other') {
                customCountryCode.style.display = 'block';
                customCountryCode.required = true;
                userPhone.disabled = true;
                customCountryCode.value = ""; 
            } else if (e.target.value !== "") {
                customCountryCode.style.display = 'none';
                customCountryCode.required = false;
                userPhone.disabled = false;
            } else {
                userPhone.disabled = true;
            }
        });

        customCountryCode.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 0) {
                userPhone.disabled = false; 
            } else {
                userPhone.disabled = true;
            }
        });

        // ------------------------------------------
        // NEW WHATSAPP LOGIC
        // ------------------------------------------
        const waToggle = document.getElementById('waToggle');
        const waOptions = document.getElementById('waOptions');
        const waUsername = document.getElementById('waUsername');
        const waCountryCode = document.getElementById('waCountryCode');
        const waCustomCountryCode = document.getElementById('waCustomCountryCode');
        const waPhone = document.getElementById('waPhone');

        // Toggle WhatsApp section visibility
        waToggle.addEventListener('change', (e) => {
            waOptions.style.display = e.target.checked ? 'block' : 'none';
            if (!e.target.checked) {
                // Reset states if turned off
                waUsername.value = '';
                waCountryCode.value = '';
                waCustomCountryCode.value = '';
                waPhone.value = '';
                updateWaStates();
            }
        });

        // Smart Exclusivity Logic for WhatsApp Section
        const updateWaStates = () => {
            const hasUsername = waUsername.value.trim().length > 0;
            const isWaOther = waCountryCode.value === 'other';
            const hasWaCustom = waCustomCountryCode.value.trim().length > 0;
            const hasWaStandard = waCountryCode.value !== '' && !isWaOther;
            const hasWaNumber = waPhone.value.trim().length > 0;
            
            const hasPhoneData = hasWaStandard || (isWaOther && hasWaCustom) || hasWaNumber || waCountryCode.value !== '';

            if (hasUsername) {
                // If Username is typed, completely lock Phone Section
                waCountryCode.disabled = true;
                waCustomCountryCode.disabled = true;
                waPhone.disabled = true;
            } else if (hasPhoneData) {
                // If Phone Section is interacted with, completely lock Username
                waUsername.disabled = true;
                
                if (isWaOther) {
                    waCustomCountryCode.style.display = 'block';
                    waPhone.disabled = !hasWaCustom; 
                } else {
                    waCustomCountryCode.style.display = 'none';
                    waCustomCountryCode.value = '';
                    waPhone.disabled = !hasWaStandard;
                }
            } else {
                // If everything is cleared, unlock both to let user choose again
                waUsername.disabled = false;
                waCountryCode.disabled = false;
                waCustomCountryCode.disabled = false;
                waCustomCountryCode.style.display = 'none';
                waPhone.disabled = true; // Disabled because no code is selected yet
            }
        };

        // Attach listeners to WhatsApp inputs
        waUsername.addEventListener('input', updateWaStates);
        waCountryCode.addEventListener('change', updateWaStates);
        waCustomCountryCode.addEventListener('input', updateWaStates);
        waPhone.addEventListener('input', updateWaStates);

        // ------------------------------------------
        // SUBMIT LOGIC
        // ------------------------------------------
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const message = document.getElementById('userMessage').value;
            const address = document.getElementById('userAddress').value;
            
            const phoneCode = countryCodeSelect.value === 'other' ? customCountryCode.value : countryCodeSelect.value;
            const phone = phoneCode + " " + userPhone.value;

            // Process WhatsApp Data before sending
            let whatsappData = "Not Provided";
            if (waToggle.checked) {
                if (waUsername.value.trim() !== "") {
                    whatsappData = "Username: " + waUsername.value.trim();
                } else {
                    const waCode = waCountryCode.value === 'other' ? waCustomCountryCode.value : waCountryCode.value;
                    if (waCode && waPhone.value.trim() !== "") {
                        whatsappData = "Number: " + waCode + " " + waPhone.value.trim();
                    }
                }
            }

            // Trigger Boom Animation
            for (let i = 0; i < 30; i++) {
                let particle = document.createElement('div');
                particle.className = 'particle';
                document.body.appendChild(particle);
                let angle = Math.random() * 2 * Math.PI;
                let distance = Math.random() * 100 + 20; 
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                const colors = ['#8a2be2', '#b82be2', '#ffffff', '#25D366'];
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                setTimeout(() => particle.remove(), 800);
            }

            // Save to Firebase
            const newSubmissionRef = push(ref(db, 'user_submissions'));
            set(newSubmissionRef, {
                name: name,
                email: email,
                phone: phone,
                whatsapp: whatsappData, // Added WhatsApp payload
                address: address,
                message: message,
                timestamp: new Date().toLocaleString()
            }).then(() => {
                alert("You wait for some time, the user will contact you soon");

                submitBtn.innerText = "Submitted!";
                submitBtn.style.background = "#8a2be2";
                
                // Reset form and UI states
                form.reset();
                customCountryCode.style.display = 'none';
                customCountryCode.required = false;
                userPhone.disabled = true;
                
                // Reset WhatsApp states
                waOptions.style.display = 'none';
                updateWaStates();

                setTimeout(() => {
                    submitBtn.innerText = "Submit Data";
                    submitBtn.style.background = "transparent";
                }, 2000);
            });
        });
    </script>
</body>
</html>
